# /etc/nginx/sites-available/otree
#
# Serves:
#   /        → oTree game (port 8000)
#   /lobby   → Lobby app (port 8001)
#
# Replace YOUR_DOMAIN_OR_IP with your server's IP or domain name.

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # ── Lobby (must come before the / catch-all) ──────────────────
    location /lobby {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── oTree (everything else) ───────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (oTree uses channels)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── Static files served directly by nginx ────────────────────
    location /static/ {
        alias /path/to/your/otree-project/_static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    client_max_body_size 10M;
}
